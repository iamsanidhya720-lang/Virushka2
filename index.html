<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    background: #4ec0ca;
    font-family: Arial, sans-serif;
}

canvas {
    border: 2px solid #000;
    display: block;
}

/* Simple start overlay */
#startOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.overlayBox {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

.overlayBox button {
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 10px;
}

/* Footer */
footer {
    position: fixed;
    bottom: 5px;
    font-size: 12px;
}

footer a {
    color: #000;
    text-decoration: none;
    padding: 0 8px;
    border-right: 1px solid #000;
}

footer a:last-child {
    border-right: none;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="startOverlay">
    <div class="overlayBox">
        <h2>I love thanasri varma</h2>
        <button onclick="startGame()">Start Game</button>
    </div>
</div>

<footer>
    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="https://linked.in" target="_blank">LinkedIn</a>
    <a href="https://x.com" target="_blank">Twitter/X</a>
    <a href="https://sanidhyas.vercel.app" target="_blank">Portfolio</a>
</footer>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

/* ---------------- RESPONSIVE CANVAS ---------------- */
function resizeCanvas() {
    const baseWidth = 400;
    const baseHeight = 600;

    const scale = Math.min(
        window.innerWidth / baseWidth,
        window.innerHeight / baseHeight
    );

    canvas.width = baseWidth * scale;
    canvas.height = baseHeight * scale;

    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* ---------------- LOAD IMAGES ---------------- */
const birdImage = new Image();
birdImage.src = "bird.png";

const pipeImage = new Image();
pipeImage.src = "pipe.png";

/* ---------------- LOAD AUDIO ---------------- */
const bgMusic = new Audio("background.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

const jumpSound = new Audio("jump.mp3");
jumpSound.volume = 0.5;

const hitSound = new Audio("hit.mp3");
hitSound.volume = 0.6;

/* ---------------- GAME VARIABLES ---------------- */
let bird = {
    x: 80,
    y: 250,
    width: 34,
    height: 34,
    gravity: 0.5,
    velocity: 0,
    jump: -8.5,
    rotation: 0
};

let pipes = [];
let frame = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let level = 1;
let gameOver = false;
let gameStarted = false;
let hitSoundPlayed = false; // hit.mp3 only plays on the FIRST game over, never after restart

/* FIX 3: Start easier values */
let pipeGap = 200;       // was 150 — much more forgiving at start
let pipeWidth = 52;
let pipeSpeed = 1.5;     // was 2 — slower start

let groundHeight = 112;

/* ---------------- STOP MUSIC (on hit only) ---------------- */
function fadeOutMusic() {
    bgMusic.pause();
    bgMusic.currentTime = 0;
}

/* ---------------- DRAW BACKGROUND ---------------- */
function drawBackground() {
    ctx.fillStyle = "#4ec0ca";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ---------------- DRAW BIRD ---------------- */
function drawBird() {
    ctx.save();
    ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
    ctx.rotate(bird.rotation);
    ctx.drawImage(
        birdImage,
        -bird.width / 2,
        -bird.height / 2,
        bird.width,
        bird.height
    );
    ctx.restore();
}

/* ---------------- DRAW PIPE ---------------- */
function drawPipe(x, y, width, height, flip) {
    ctx.save();
    if (flip) {
        ctx.translate(x + width / 2, y + height / 2);
        ctx.scale(1, -1);
        ctx.drawImage(pipeImage, -width/2, -height/2, width, height);
    } else {
        ctx.drawImage(pipeImage, x, y, width, height);
    }
    ctx.restore();
}

/* ---------------- DRAW SCORE ---------------- */
function drawScore() {
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;
    ctx.textAlign = "center";

    ctx.font = "bold 40px Arial";
    ctx.strokeText(score, canvas.width/2, 70);
    ctx.fillText(score, canvas.width/2, 70);

    ctx.font = "20px Arial";
    ctx.strokeText("Level: " + level, canvas.width/2, 100);
    ctx.fillText("Level: " + level, canvas.width/2, 100);

    ctx.strokeText("High: " + highScore, canvas.width/2, 130);
    ctx.fillText("High: " + highScore, canvas.width/2, 130);
}

/* ---------------- UPDATE GAME ---------------- */
function update() {
    if (!gameStarted || gameOver) return;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.velocity < 0) {
        bird.rotation = -0.5;
    } else {
        bird.rotation = Math.min(bird.rotation + 0.03, 1.2);
    }

    if (frame % 90 === 0) {
        let minHeight = 80;
        let maxHeight = 600 - groundHeight - pipeGap - 80;
        let topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

        pipes.push({
            x: 400,
            topHeight: topHeight,
            bottomY: topHeight + pipeGap,
            scored: false
        });
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed;

        if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
            pipes[i].scored = true;
            score++;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("highScore", highScore);
            }

            level = Math.floor(score / 5) + 1;

            /* FIX 3: Progressive difficulty — gentler scaling */
            pipeSpeed = 1.5 + level * 0.15;   // was 2 + level * 0.2
            pipeGap = 200 - level * 4;         // was 150 - level * 3 (starts bigger, shrinks slowly)
            if (pipeGap < 110) pipeGap = 110;
        }

        if (
            bird.x < pipes[i].x + pipeWidth &&
            bird.x + bird.width > pipes[i].x &&
            (bird.y < pipes[i].topHeight ||
             bird.y + bird.height > pipes[i].bottomY)
        ) {
            triggerGameOver();
        }

        if (pipes[i].x + pipeWidth < 0) {
            pipes.splice(i, 1);
        }
    }

    if (bird.y + bird.height > 600 - groundHeight || bird.y < 0) {
        triggerGameOver();
    }

    frame++;
}

/* FIX 2: Separate function so hit sound only plays once when game over is triggered */
function triggerGameOver() {
    if (!gameOver) {
        gameOver = true;
        if (!hitSoundPlayed) {
            hitSound.play();
            hitSoundPlayed = true;
        }
        fadeOutMusic();
    }
}

/* ---------------- DRAW GAME ---------------- */
function draw() {
    drawBackground();

    for (let pipe of pipes) {
        drawPipe(pipe.x, 0, pipeWidth, pipe.topHeight, true);
        drawPipe(pipe.x, pipe.bottomY, pipeWidth, 600 - groundHeight - pipe.bottomY, false);
    }

    drawBird();

    if (gameStarted) drawScore();

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0,0,400,600);
        ctx.fillStyle = "#fff";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", 200, 300);
        ctx.fillText("Click to Restart", 200, 340);
    }
}

/* ---------------- GAME LOOP ---------------- */
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();

/* ---------------- RESET GAME ---------------- */
function resetGame() {
    bird.y = 250;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    level = 1;
    gameOver = false;
    gameStarted = true;
    // hitSoundPlayed is intentionally NOT reset — hit.mp3 only ever plays once

    /* FIX 3: Reset to easy starting values */
    pipeGap = 200;
    pipeSpeed = 1.5;

    // Resume background music — loops continuously until hit
    bgMusic.currentTime = 0;
    bgMusic.play();
}

/* ---------------- START BUTTON ---------------- */
function startGame() {
    document.getElementById("startOverlay").style.display = "none";
    resetGame();
}

/* ---------------- INPUT ---------------- */
canvas.addEventListener("click", () => {
    if (gameOver) {
        resetGame();
    } else {
        bird.velocity = bird.jump;
        jumpSound.play();
    }
});

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        e.preventDefault();
        if (gameOver) {
            resetGame();
        } else {
            bird.velocity = bird.jump;
            jumpSound.play();
        }
    }
});
</script>
</body>
</html>
